<div id="widget-chucknorris">
    <link rel="stylesheet" href="{{css}}"/>

    {{#errorExists}}
    <p class="chucknorris-joke">Error: Could not retrieve Chuck Norris fact</p>
    {{/errorExists}}

    {{^errorExists}}
    <p class="chucknorris-joke">{{joke}}</p>
    {{/errorExists}}

    <span class="chucknorris-silhouette" role="img" aria-label="Chuck Norris silhouette" style="--chucknorris-silhouette-url: url('{{image}}')"></span>

    <p class="chucknorris-footer">
        <a class="chucknorris-credit" href="https://api.chucknorris.io/">The Internet Chuck Norris Database</a>
    </p>
</div>
